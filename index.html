<!DOCTYPE html>
<html>
<head>
    <title>the clicker</title>
</head>
<body>
    <div id="main">
        <center>
            <div id="content">0</div>
            <button onclick="plus()">press</button>
        </center>
    </div>
</body>

<style>
    html, body {
        width: 100%;
        height: 100%;
        margin: 0;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        color: white;
        font-family: sans-serif;
    }

    #main {
        width: 90vw;
        max-width: 400px;
        text-align: center;
    }

    #content {
        font-size: 4vw;
        margin-bottom: 5vh;
    }

    button {
        width: 30vw;
        max-width: 120px;
        height: 30vw;
        max-height: 120px;
        background-color: rgb(9, 5, 15);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
    }
</style>

<script>
const content = document.querySelector("#content");
content.innerHTML = localStorage.getItem('saveNum') || 0;
function plus() {
    const countNow = parseInt(content.innerHTML);
    content.innerHTML = countNow + 1;
    localStorage.setItem('saveNum', countNow + 1);
}
</script>
</html>
